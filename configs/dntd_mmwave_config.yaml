# dntd_mmwave_config.yaml
# DNTD Dynamics — mmWave Safety Node Configuration
#
# This file configures the safety node (dntd_mmwave_safety_node.py).
# For the driver/sensor config see dntd_mmwave_driver_config.yaml.
#
# Deploy: <repo>/configs/dntd_mmwave_config.yaml
# Run from the repo root with:
#   python3 src/dntd_mmwave_safety_node.py \
#     --ros-args --params-file configs/dntd_mmwave_config.yaml
#
# No topic remap is needed — the driver node publishes /dntd/mmwave/raw_points
# directly, which is the topic this node subscribes to.
#
# Optional per-site overrides: add a second params file that only contains the
# keys you want to change, layered after the base config:
#     --params-file configs/dntd_mmwave_config.local.yaml

dntd_mmwave_safety:
  ros__parameters:

    # -------------------------------------------------------------------------
    # SENSOR MOUNT
    # Which URDF link is the sensor rigidly attached to?
    # Examples:
    #   UR5 / UR10:   "tool0"
    #   xArm6:        "link6"
    #   Custom arm:   whatever you named the forearm or shoulder link
    #   Humanoid:     "torso_link" or "chest_link"
    #   Stick test:   "base_link" (sensor is stationary)
    # -------------------------------------------------------------------------
    sensor_mount_link: "tool0"

    # XYZ offset (meters) from mount link origin to sensor origin
    sensor_mount_xyz: [0.0, 0.0, 0.05]

    # RPY rotation (radians) from mount link frame to sensor frame
    sensor_mount_rpy: [0.0, 0.0, 0.0]


    # -------------------------------------------------------------------------
    # KINEMATIC CHAIN
    # Joint names must match your URDF exactly.
    # For stick testing, leave as-is — fake_joint_states.py publishes these.
    # -------------------------------------------------------------------------
    joint_names:
      - "joint1"
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"
      - "joint6"

    joint_geometry:
      joint1:
        type: revolute
        origin_xyz: [0.0, 0.0, 0.127]
        origin_rpy: [0.0, 0.0, 0.0]
        axis: [0.0, 0.0, 1.0]
      joint2:
        type: revolute
        origin_xyz: [0.0, 0.0, 0.0]
        origin_rpy: [1.5708, 0.0, 0.0]
        axis: [0.0, 1.0, 0.0]
      joint3:
        type: revolute
        origin_xyz: [0.425, 0.0, 0.0]
        origin_rpy: [0.0, 0.0, 0.0]
        axis: [0.0, 1.0, 0.0]
      joint4:
        type: revolute
        origin_xyz: [0.392, 0.0, 0.0]
        origin_rpy: [1.5708, 0.0, 0.0]
        axis: [0.0, 0.0, 1.0]
      joint5:
        type: revolute
        origin_xyz: [0.0, 0.109, 0.0]
        origin_rpy: [-1.5708, 0.0, 0.0]
        axis: [0.0, 1.0, 0.0]
      joint6:
        type: revolute
        origin_xyz: [0.0, -0.093, 0.0]
        origin_rpy: [1.5708, 0.0, 0.0]
        axis: [0.0, 0.0, 1.0]


    # -------------------------------------------------------------------------
    # TIMING
    # -------------------------------------------------------------------------
    interpolate_joint_states: true
    joint_states_timeout_s: 0.5
    heartbeat_hz: 5.0


    # -------------------------------------------------------------------------
    # ZONE GEOMETRY (meters)
    # Tune these to match your arm's reach and operating environment.
    #
    # Tuning guide:
    #   stop_range_m    — minimum safe clearance at max arm speed
    #                     start at 0.5m, reduce only after controlled testing
    #   caution_range_m — should give enough time to decelerate
    #                     typically 2-3x stop_range
    #   fast_approach_mps — lower = more sensitive (more false positives)
    #                       0.8 m/s ≈ brisk walk / stumble speed
    #                       raise for industrial environments with fast workers
    # -------------------------------------------------------------------------
    stop_range_m:       0.5
    caution_range_m:    1.2
    fast_approach_mps:  -0.8
    min_snr_db:         8.0


    # -------------------------------------------------------------------------
    # BACKGROUND LEARNING
    #
    # The sensor learns the static environment (walls, fixtures, arm mount)
    # during startup. After learning, only novel objects (people, tools)
    # trigger zone responses. The arm will hold STOP during learning.
    #
    # background_learning_s — how long to learn the static scene
    #   Tune this for your environment:
    #   - Small controlled lab:    5–10s
    #   - Typical workshop:        15s  (default)
    #   - Cluttered environment:   30s
    #   - Complex changing space:  30s+ with continuous decay
    #
    # background_voxel_size_m — spatial resolution of background grid (meters)
    #   Smaller = finer detail but more memory. 0.10m (10cm) suits most arms.
    #   Reduce to 0.05m for precision work near cluttered surfaces.
    #
    # background_hit_threshold — fraction of learning frames a voxel must
    #   appear in to count as background (0.0–1.0).
    #   Lower = more aggressive masking (may mask slow-moving objects).
    #   Higher = stricter (walls may not fully mask if sensor vibrates).
    #   0.30 (30% of frames) is a safe default.
    # -------------------------------------------------------------------------
    background_learning_s:    15.0
    background_voxel_size_m:  0.10
    background_hit_threshold: 0.30


    # -------------------------------------------------------------------------
    # MICRO-DOPPLER CLASSIFIER
    #
    # Rule-based classifier that distinguishes people from objects (falling
    # tools, vibrating equipment, debris) using cluster features extracted
    # from the novel point cloud.
    #
    # Safety stance: FAIL-SAFE
    #   PERSON  → passes to zone logic normally
    #   UNKNOWN → passes to zone logic (treated as PERSON)
    #   OBJECT  → suppressed, logged to <repo>/logs/classifier_training.csv
    #
    # classifier_enabled — set false to bypass entirely (all novel points
    #   pass through unfiltered, original behavior restored)
    #
    # Tuning guide:
    #   velocity_spread_min — lower = more sensitive (more false positives)
    #                         raise if stationary equipment gets flagged
    #   height_span_min     — lower = catches crouching people
    #                         raise if floor-level clutter causes false positives
    #   score_threshold     — 1 = very sensitive, 4 = very strict
    #                         2 (default) is conservative fail-safe
    #   eps_m               — DBSCAN cluster radius. Raise for sparser clouds.
    #
    # Training data:
    #   classifier_log_enabled=true automatically logs suppressed OBJECT
    #   detections to CSV. This builds your labeled dataset for Phase 6b
    #   ML model training without any extra work.
    # -------------------------------------------------------------------------
    classifier_enabled:             true
    classifier_eps_m:               0.40
    classifier_min_points:          2
    classifier_velocity_spread_min: 0.08
    classifier_height_span_min:     0.10
    classifier_point_count_min:     3
    classifier_score_threshold:     2
    classifier_log_enabled:         true   # logs suppressed objects for ML training


    # -------------------------------------------------------------------------
    # OUTPUT INTERFACES
    # All optional — leave blank/false to disable.
    # Serial, GPIO, and MQTT publish simultaneously if configured.
    # -------------------------------------------------------------------------

    # Serial: "CLEAR\n" / "CAUTION\n" / "STOP\n"
    # Examples: "/dev/ttyACM0" (Arduino), "/dev/ttyS0" (Pi UART)
    output_serial_port: ""

    # GPIO (Raspberry Pi BCM only): pin 17=CLEAR, 27=CAUTION, 22=STOP
    output_use_gpio: false

    # MQTT broker for Sterling integration


    # -------------------------------------------------------------------------
    # SWEPT-VOLUME WORKSPACE CLIPPER
    #
    # Defines the reachable workspace of the arm from the sensor mount point.
    # Detections outside the reachable envelope are suppressed — the arm
    # physically cannot reach them so they are not a safety concern.
    # Detections inside the self-exclusion zone are the arm's own body.
    #
    # This is what makes arm-mounted mmWave fundamentally different from
    # fixed-mount sensors — the system knows its own geometry.
    #
    # Hardware configuration (3× IWR6843AOP on forearm):
    #   Sensors mount on the forearm link between joint 3 and joint 4.
    #   mount_joint_idx: 3 (0-indexed, so joint 4 on a 6-DOF arm)
    #
    # swept_volume_max_reach_m:
    #   0.0 = auto-compute from kinematic chain link lengths (recommended)
    #   Set manually if auto-compute doesn't match your physical arm.
    #   Measured from the mount joint origin to the end effector tip.
    #
    # swept_volume_self_radius_m:
    #   Exclusion sphere around the mount point — suppresses returns
    #   from the arm's own body. Set to roughly half the arm link diameter.
    #   Default 0.15m suits most 6-DOF collaborative arms.
    #
    # swept_volume_reach_margin_m:
    #   Safety margin added to max reach. Catches detections just outside
    #   the nominal boundary. Default 0.20m recommended.
    #
    # swept_volume_enabled:
    #   Set false to bypass entirely — all points pass through unfiltered.
    #   Use during initial setup/tuning to verify classifier behavior first.
    # -------------------------------------------------------------------------
    swept_volume_enabled:         true
    swept_volume_mount_joint_idx: 3      # forearm link (joint 4 on 6-DOF arm)
    #swept_volume_max_reach_m:     0.0    # 0 = auto-compute from chain geometry
    swept_volume_max_reach_m:     2.0    # manual — covers full test range, this is for testing only, comment out and remove comment for above for auto-compute on multi-axis arm
    swept_volume_self_radius_m:   0.15   # arm body exclusion radius
    swept_volume_reach_margin_m:  0.20   # safety margin beyond nominal reach

    output_mqtt_broker: ""   # e.g. "0.0.0.0"
